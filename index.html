<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>the-ux-review-blog</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <!-- start header -->
    <div class="layout">
        <header>
            <div class="container header-container">
                <a class="header-text" href="#hero">
                    <span>The UX</span>
                    <span class="review-span">Review</span>
                </a>
                <nav>
                    <ul class="header-links">
                        <li class="link"><a href="#hero">HOME</a><img src="Images/star-solid-full.png" alt="star-logo">
                        </li>
                        <li class="link"><a href="#latest-articles">LATEST ARTICLES</a><img
                                src="Images/star-solid-full.png" alt="star-logo"></li>
                        <li class="link"><a href="#authors">AUTHORS</a><img src="Images/star-solid-full.png"
                                alt="star-logo"></li>
                        <li class="link"><a href="#community">COMMUNITY</a></li>
                    </ul>
                </nav>
                <div class="subscribe-now">
                    <a href="#community">SUBSCRIBE NOW</a>
                </div>
                <a href="#menu" class="menu-icon small-shadow">☰</a>
            </div>
        </header>
        <!-- end header -->

        <!-- start sidebar -->

        <aside>
            <div id="menu" class="mobile-menu">
                <div class="menu-header">
                    <span>MENU</span>
                    <a href="#" class="close-btn">✕</a>
                </div>
                <ul>
                    <li><a href="#hero">HOME</a></li>
                    <li><a href="#latest-articles">LATEST ARTICLES</a></li>
                    <li><a href="#authors">AUTHORS</a></li>
                    <li> <a href="#community">COMMUNITY</a></li>
                </ul>
                <a class="mobile-subscribe small-shadow" href="#community"><img src="Images/rocket-solid-full.png"
                        alt="rocket-logo"><span>SUBSCRIBE NOW</span></a>
            </div>
        </aside>

        <!-- end sidebar -->

    </div>

</body>

</html>
